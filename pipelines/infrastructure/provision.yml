trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infrastructure/**

pool:
  vmImage: 'ubuntu-latest'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - staging
      - prod

  - name: deploymentMode
    displayName: 'Deployment Mode'
    type: string
    default: 'Incremental'
    values:
      - Incremental
      - Complete

variables:
  - group: azure-credentials
  - name: resourceGroupName
    value: 'myapp-${{ parameters.environment }}-rg'
  - name: location
    value: 'eastus'
  - name: bicepFilePath
    value: 'infrastructure/main.bicep'

stages:
  - stage: Validate
    displayName: 'Validate Infrastructure'
    jobs:
      - job: ValidateJob
        displayName: 'Validate Bicep Templates'
        steps:
          - task: AzureCLI@2
            displayName: 'Install Bicep CLI'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep install
                az bicep version

          - task: AzureCLI@2
            displayName: 'Lint Bicep Files'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Linting Bicep files..."
                az bicep build --file $(bicepFilePath)

          - task: AzureCLI@2
            displayName: 'Validate Deployment'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub validate \
                  --location $(location) \
                  --template-file $(bicepFilePath) \
                  --parameters environment=${{ parameters.environment }}

  - stage: Deploy
    displayName: 'Deploy Infrastructure'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - deployment: DeployInfrastructure
        displayName: 'Deploy Bicep Templates'
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Create Resource Group'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az group create \
                        --name $(resourceGroupName) \
                        --location $(location) \
                        --tags environment=${{ parameters.environment }} managed-by=azure-pipelines

                - task: AzureResourceManagerTemplateDeployment@3
                  displayName: 'Deploy Bicep Template'
                  inputs:
                    deploymentScope: 'Resource Group'
                    azureResourceManagerConnection: '$(azureSubscription)'
                    subscriptionId: '$(subscriptionId)'
                    action: 'Create Or Update Resource Group'
                    resourceGroupName: '$(resourceGroupName)'
                    location: '$(location)'
                    templateLocation: 'Linked artifact'
                    csmFile: '$(bicepFilePath)'
                    deploymentMode: '${{ parameters.deploymentMode }}'
                    deploymentOutputs: 'deploymentOutputs'

                - task: PowerShell@2
                  displayName: 'Parse Deployment Outputs'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $outputs = '$(deploymentOutputs)' | ConvertFrom-Json
                      Write-Host "Deployment Outputs:"
                      $outputs.PSObject.Properties | ForEach-Object {
                        Write-Host "  $($_.Name): $($_.Value.value)"
                        Write-Host "##vso[task.setvariable variable=$($_.Name);isOutput=true]$($_.Value.value)"
                      }

                - task: AzureCLI@2
                  displayName: 'Tag Resources'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Tagging resources in $(resourceGroupName)..."
                      az tag create --resource-id /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName) \
                        --tags deployed-by=azure-pipelines deployment-date=$(date +%Y-%m-%d) pipeline-id=$(Build.BuildId)
